services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: ${DB_PASSWORD:-planner}
      POSTGRES_DB: planner
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://planner:${DB_PASSWORD:-planner}@db:5432/planner
      JWT_SECRET: ${JWT_SECRET:-bitte-aendern}
      APP_URL: ${APP_URL:-http://localhost:8080}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      UPLOAD_DIR: /data/uploads
      # E-Mail über Microsoft 365: graph | smtp | console
      MAIL_PROVIDER: ${MAIL_PROVIDER:-console}
      MAIL_SENDER: ${MAIL_SENDER:-}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID:-}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID:-}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
